name: Github push nuget 
permissions:
  id-token: write   # required for GitHub OIDC
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: |
        cd src
        cd RSCG_Templating
        dotnet tool restore
        dotnet r pack

    - name: NuGet Login
      uses: NuGet/login@v1
      id: login
      with:
        user: ignatandrei


    - name: push nuget
      run: |
          dotnet nuget push ${{github.workspace}}/src/RSCG_Templating/PACK/*symb*.*pkg --api-key  "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json
  